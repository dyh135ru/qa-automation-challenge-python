[pytest]
# Framework execution settings
addopts = --alluredir=reports/allure-results --browser chromium --headed --slowmo 500
testpaths = step_definitions

# Custom markers for test categorization (BDD Tags)
markers =
    smoke: Critical path tests for smoke testing
    regression: Full suite for regression testing
    auth: Authentication related scenarios
    upload: File upload functionality tests
    dynamic: Dynamic content and synchronization tests
    herokuapp: Tests for the first exercise
    saucedemo: Tests for the second exercise
    mobile: Tests with 375px viewport

# Logging configuration for terminal output
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S
